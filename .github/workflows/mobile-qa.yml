# Android parity plan/loop docs: local scratch/android-parity/ (gitignored).
name: Mobile QA

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - "packages/shared/**"
      - "packages/client-runtime/**"
      - ".github/workflows/mobile-qa.yml"
      - "scripts/android-parity/**"
  schedule:
    # Nightly Maestro smoke on fork main (QA-004).
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  mobile_expo_doctor:
    name: Mobile Expo Doctor
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: expo-doctor
        working-directory: apps/mobile
        run: npx expo-doctor

  mobile_ios_regression_unit:
    name: Mobile iOS regression (FORCE_* dogfood)
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Ensure Electron runtime is installed
        run: vp run --filter @t3tools/desktop ensure:electron

      - name: FORCE_* mobile unit tests
        env:
          EXPO_PUBLIC_FORCE_JS_REVIEW: "1"
          EXPO_PUBLIC_FORCE_NITRO_MARKDOWN: "1"
        run: vp test run apps/mobile

  mobile_maestro_android:
    name: Mobile Maestro Android
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Maestro smoke on API 34 emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          EXPO_PUBLIC_MAESTRO_AUTH_BYPASS: "1"
          RELAY_STAGING_URL: ${{ secrets.RELAY_STAGING_URL }}
          RELAY_STAGING_TEST_SECRET: ${{ secrets.RELAY_STAGING_TEST_SECRET }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_8
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: ./scripts/android-parity/run-maestro-android.sh

      - name: Upload Maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-debug
          path: |
            maestro-logcat.txt
            ~/.maestro/tests/**
          if-no-files-found: ignore
