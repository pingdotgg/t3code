name: Linux Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package:
    name: Build deb and rpm (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install --yes rpm

      - name: Apply tagged package version
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/update-release-package-versions.ts "${GITHUB_REF_NAME#v}"

      - name: Build Linux packages
        run: vp run dist:linux

      - name: Inspect packages
        run: |
          dpkg-deb --info release/*.deb
          rpm --query --package --info release/*.rpm

      - name: Upload packages
        uses: actions/upload-artifact@v6
        with:
          name: morecode-headless-linux-${{ matrix.arch }}
          path: |
            release/*.deb
            release/*.rpm
          if-no-files-found: error

  release:
    name: Upload to GitHub release
    needs: package
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download amd64 packages
        uses: actions/download-artifact@v6
        with:
          name: morecode-headless-linux-amd64
          path: release

      - name: Download arm64 packages
        uses: actions/download-artifact@v6
        with:
          name: morecode-headless-linux-arm64
          path: release

      - name: Upload packages to tagged release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" ||
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" release/*.deb release/*.rpm --clobber
