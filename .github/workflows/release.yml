name: Release Desktop (Fork)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 1.2.3 or v1.2.3)"
        required: true
        type: string
      targets:
        description: "Platforms to build (comma-separated: linux, mac-arm64, mac-x64, windows)"
        required: false
        default: "linux"
        type: string

permissions:
  contents: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      ref: ${{ github.sha }}
      build_linux: ${{ steps.targets.outputs.build_linux }}
      build_mac_arm64: ${{ steps.targets.outputs.build_mac_arm64 }}
      build_mac_x64: ${{ steps.targets.outputs.build_mac_x64 }}
      build_windows: ${{ steps.targets.outputs.build_windows }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: release_meta
        name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi

          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - id: targets
        name: Resolve target platforms
        shell: bash
        run: |
          # On tag push, build all platforms. On workflow_dispatch, use input.
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            targets="${{ github.event.inputs.targets }}"
          else
            targets="linux,mac-arm64,mac-x64,windows"
          fi

          echo "Building targets: $targets"

          [[ "$targets" == *"linux"*     ]] && echo "build_linux=true"     >> "$GITHUB_OUTPUT" || echo "build_linux=false"     >> "$GITHUB_OUTPUT"
          [[ "$targets" == *"mac-arm64"* ]] && echo "build_mac_arm64=true" >> "$GITHUB_OUTPUT" || echo "build_mac_arm64=false" >> "$GITHUB_OUTPUT"
          [[ "$targets" == *"mac-x64"*   ]] && echo "build_mac_x64=true"   >> "$GITHUB_OUTPUT" || echo "build_mac_x64=false"   >> "$GITHUB_OUTPUT"
          [[ "$targets" == *"windows"*   ]] && echo "build_windows=true"   >> "$GITHUB_OUTPUT" || echo "build_windows=false"   >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  build_linux:
    name: Build Linux x64
    needs: preflight
    if: needs.preflight.outputs.build_linux == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop artifact (unsigned)
        run: |
          bun run dist:desktop:artifact -- \
            --platform linux \
            --target AppImage \
            --arch x64 \
            --build-version "${{ needs.preflight.outputs.version }}" \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-publish
          shopt -s nullglob
          for f in release/*.AppImage release/*.blockmap release/latest*.yml; do
            cp "$f" release-publish/
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-x64
          path: release-publish/*
          if-no-files-found: error

  build_mac_arm64:
    name: Build macOS arm64
    needs: preflight
    if: needs.preflight.outputs.build_mac_arm64 == 'true'
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop artifact (unsigned)
        run: |
          bun run dist:desktop:artifact -- \
            --platform mac \
            --target dmg \
            --arch arm64 \
            --build-version "${{ needs.preflight.outputs.version }}" \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-publish
          shopt -s nullglob
          for f in release/*.dmg release/*.zip release/*.blockmap release/latest*.yml; do
            cp "$f" release-publish/
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-mac-arm64
          path: release-publish/*
          if-no-files-found: error

  build_mac_x64:
    name: Build macOS x64
    needs: preflight
    if: needs.preflight.outputs.build_mac_x64 == 'true'
    runs-on: macos-15-intel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop artifact (unsigned)
        run: |
          bun run dist:desktop:artifact -- \
            --platform mac \
            --target dmg \
            --arch x64 \
            --build-version "${{ needs.preflight.outputs.version }}" \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-publish
          shopt -s nullglob
          for f in release/*.dmg release/*.zip release/*.blockmap release/latest-mac.yml; do
            cp "$f" release-publish/
          done
          [[ -f release-publish/latest-mac.yml ]] && mv release-publish/latest-mac.yml release-publish/latest-mac-x64.yml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-mac-x64
          path: release-publish/*
          if-no-files-found: error

  build_windows:
    name: Build Windows x64
    needs: preflight
    if: needs.preflight.outputs.build_windows == 'true'
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop artifact (unsigned)
        shell: bash
        run: |
          bun run dist:desktop:artifact -- \
            --platform win \
            --target nsis \
            --arch x64 \
            --build-version "${{ needs.preflight.outputs.version }}" \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-publish
          shopt -s nullglob
          for f in release/*.exe release/*.blockmap release/latest*.yml; do
            cp "$f" release-publish/
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x64
          path: release-publish/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [preflight, build_linux, build_mac_arm64, build_mac_x64, build_windows]
    # Run even if some build jobs were skipped
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-24.04
    steps:
      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: T3 Code (Fork) v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: |
            release-assets/**
          fail_on_unmatched_files: false
