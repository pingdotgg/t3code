<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>T3 Code</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: #101011;
        color: #f5f5f5;
      }
      .panel {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
      }
      .setup {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
      }
      h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.25;
      }
      p {
        margin: 0;
        color: #a1a1aa;
        font-size: 13px;
        line-height: 1.45;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 12px;
        font-weight: 700;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        min-height: 36px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        font: inherit;
        padding: 0 10px;
      }
      button {
        min-height: 36px;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 800;
        padding: 0 12px;
      }
      button.secondary {
        background: rgba(255, 255, 255, 0.08);
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .status {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: #d4d4d8;
        font-size: 12px;
        line-height: 1.45;
        padding: 10px;
        word-break: break-word;
      }
      .error {
        color: #fca5a5;
      }
      .chat {
        display: flex;
        flex: 1;
        min-height: 100vh;
      }
      iframe {
        display: block;
        width: 100%;
        height: 100vh;
        flex: 1;
        border: 0;
        background: #0f0f10;
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <section class="setup" id="setup">
        <h1>T3 Code Browser Agent</h1>
        <p id="setup-copy">Pair this browser with T3 Code, then use Preview.</p>
        <form id="pair-form">
          <label>
            Backend URL
            <input id="base-url" placeholder="http://100.x.y.z:3773" />
          </label>
          <label>
            Pairing token
            <input id="credential" placeholder="Paste token" />
          </label>
          <div class="row">
            <button type="submit">Pair</button>
            <button class="secondary" id="forget" type="button">Forget</button>
          </div>
        </form>
        <div class="status" id="status">Loading...</div>
      </section>
      <section class="chat" id="chat" hidden>
        <iframe
          id="chat-frame"
          title="T3 Code chat"
          allow="clipboard-read; clipboard-write"
        ></iframe>
      </section>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
