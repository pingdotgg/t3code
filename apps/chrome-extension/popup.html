<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>T3 Code Browser Agent</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      body {
        margin: 0;
        width: 360px;
        background: #101011;
        color: #f5f5f5;
      }
      main {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
      }
      h1 {
        font-size: 16px;
        margin: 0;
      }
      p {
        color: #a1a1aa;
        font-size: 13px;
        line-height: 1.45;
        margin: 0;
      }
      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 12px;
        font-weight: 700;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        font: inherit;
        min-height: 36px;
        padding: 0 10px;
      }
      button {
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 800;
        min-height: 36px;
        padding: 0 12px;
      }
      button.secondary {
        background: rgba(255, 255, 255, 0.08);
      }
      .row {
        display: flex;
        gap: 8px;
      }
      .status {
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: #d4d4d8;
        font-size: 12px;
        line-height: 1.45;
        padding: 10px;
        word-break: break-word;
      }
      .error {
        color: #fca5a5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>T3 Code Browser Agent</h1>
      <p>Pair this browser with a T3 Code backend, then use Preview from T3 Code.</p>
      <form id="pair-form">
        <label>
          Backend URL
          <input id="base-url" placeholder="http://100.x.y.z:3773" />
        </label>
        <label>
          Pairing token
          <input id="credential" placeholder="Paste token" />
        </label>
        <div class="row">
          <button type="submit">Pair</button>
          <button class="secondary" id="forget" type="button">Forget</button>
        </div>
      </form>
      <div class="status" id="status">Loading...</div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
