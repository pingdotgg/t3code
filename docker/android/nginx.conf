server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  location = / {
    try_files /index.html =404;
  }

  location = /t3-code-preview.apk {
    default_type application/vnd.android.package-archive;
    add_header Content-Disposition 'attachment; filename="t3-code-preview.apk"';
    try_files $uri =404;
  }
}
